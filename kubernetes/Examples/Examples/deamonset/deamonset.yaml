apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-deamonset
  namespace: daneshkar
  labels:
    app: nginx
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - nginx # FIXED: Must match template label (was 'backend')
      - key: tier
        operator: In
        values:
          - prod
      - key: team
        operator: In
        values:
          - core-banking # FIXED: '*' is not a wildcard in K8s, must match literal value
  template:
    metadata:
      labels:
        app: nginx
        tier: prod
        team: core-banking
        team-payment: payment
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
