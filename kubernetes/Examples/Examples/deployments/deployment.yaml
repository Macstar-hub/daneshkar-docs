apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - nginx
      - key: tier
        operator: In
        values:
          - prod
      - key: team
        operator: In
        values:
          - core-banking
  template:
    metadata:
      labels:
        version: v2
        app: nginx
        tier: prod
        team: core-banking
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          # Liveness Probe: Tells K8s if the container is alive.
          # If this fails, K8s will restart the container.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15 # Wait 15s for Nginx to start before first check
            periodSeconds: 20 # Check every 20s
            timeoutSeconds: 2 # Timeout if no response in 2s
            failureThreshold: 3 # Restart after 3 consecutive failures
          # Readiness Probe: Tells K8s if the container is ready to serve traffic.
          # If this fails, the pod is removed from the Service load balancer.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5 # Start checking almost immediately
            periodSeconds: 10 # Check every 10s
            timeoutSeconds: 2
            successThreshold: 1 # Only 1 success needed to be "Ready"
            failureThreshold: 3
