apiVersion: v1
kind: Pod
metadata:
  name: hostpath-example-pod-w-1
spec:
  nodeSelector:
    kubernetes.io/hostname: worker-01
  volumes:
    - name: shared-storage
      hostPath:
        path: /opt/pod-hostpath.dir
        type: Directory
  containers:
    - name: sample-pod
      image: curlimages/curl
      command: ["sleep", "1000000"]
      volumeMounts:
        - name: shared-storage
          mountPath: /data
