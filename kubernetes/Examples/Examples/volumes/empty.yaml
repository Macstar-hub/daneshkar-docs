apiVersion: v1
kind: Pod
metadata:
  name: emptydir-example-pod
spec:
  volumes:
    - name: shared-storage
      emptyDir: #{}
        medium: memory ### be carefull to use tempfs as disk ...
  containers:
    - name: writer
      image: curlimages/curl
      command: ["sleep", "1000000"]
      volumeMounts:
        - name: shared-storage
          mountPath: /data
    - name: reader
      image: curlimages/curl
      command: ["sleep", "1000000"]
      volumeMounts:
        - name: shared-storage
          mountPath: /data
